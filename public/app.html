<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Azul - Projetos</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .logout-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: fadeIn 0.15s ease;
    }
    .logout-dialog {
      background: var(--white);
      border-radius: 16px;
      padding: 28px 32px 24px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
      width: 360px;
      max-width: 90vw;
      text-align: center;
      animation: scaleIn 0.15s ease;
    }
    .logout-dialog .icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      background: #fef2f2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #dc2626;
    }
    .logout-dialog h3 {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--gray-800);
      margin: 0 0 4px;
    }
    .logout-dialog p {
      font-size: 0.875rem;
      color: var(--gray-500);
      margin: 0 0 20px;
    }
    .logout-dialog .actions {
      display: flex;
      gap: 8px;
    }
    .logout-dialog .actions button {
      flex: 1;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: all 0.15s ease;
    }
    .logout-dialog .btn-cancel {
      background: var(--gray-100);
      color: var(--gray-600);
    }
    .logout-dialog .btn-cancel:hover {
      background: var(--gray-200);
    }
    .logout-dialog .btn-confirm {
      background: #dc2626;
      color: white;
    }
    .logout-dialog .btn-confirm:hover {
      background: #b91c1c;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes scaleIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    (function() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', '/api/auth/me', false);
      xhr.withCredentials = true;
      try {
        xhr.send();
        if (xhr.status === 200) {
          var user = JSON.parse(xhr.responseText);
          window.__SESSION_USER__ = { role: user.role, name: user.name, login: user.login, cargo: user.cargo };
        }
      } catch(e) {}
    })();
  </script>
  <script src="/app.js"></script>
  <script>
    (function() {
      var user = window.__SESSION_USER__;
      if (user && typeof state !== 'undefined') {
        state.user = { role: user.role, name: user.name };
        var dashboards = {
          requester: 'requester/dashboard',
          marketing: 'marketing/dashboard',
          management: 'management/dashboard',
        };
        navigate(dashboards[user.role]);
      }
    })();

    var originalLogout = window.logout;
    window.logout = function() {
      var overlay = document.createElement('div');
      overlay.className = 'logout-overlay';
      overlay.innerHTML =
        '<div class="logout-dialog">' +
          '<div class="icon">' +
            '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
              '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>' +
              '<polyline points="16 17 21 12 16 7"></polyline>' +
              '<line x1="21" y1="12" x2="9" y2="12"></line>' +
            '</svg>' +
          '</div>' +
          '<h3>Sair da conta</h3>' +
          '<p>Tem certeza que deseja sair?</p>' +
          '<div class="actions">' +
            '<button class="btn-cancel" id="cancelLogout">Cancelar</button>' +
            '<button class="btn-confirm" id="confirmLogout">Sair</button>' +
          '</div>' +
        '</div>';

      document.body.appendChild(overlay);

      document.getElementById('cancelLogout').addEventListener('click', function() {
        overlay.remove();
      });

      document.getElementById('confirmLogout').addEventListener('click', async function() {
        try {
          await fetch('/api/auth/logout', { method: 'POST' });
        } catch(e) {}
        window.location.href = '/login';
      });

      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) overlay.remove();
      });
    };
  </script>
</body>
</html>
