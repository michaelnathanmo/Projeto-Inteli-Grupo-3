<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Azul E.L.O.S. - Login</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0b1d3a 0%, #1a3a8a 40%, #2563eb 100%);
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 50%, rgba(37, 99, 235, 0.15) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 50%, rgba(59, 130, 246, 0.1) 0%, transparent 60%);
      animation: float 20s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(2%, -2%) rotate(1deg); }
      66% { transform: translate(-1%, 1%) rotate(-1deg); }
    }

    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow:
        0 4px 6px -1px rgba(0, 0, 0, 0.1),
        0 10px 15px -3px rgba(0, 0, 0, 0.15),
        0 25px 50px -12px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, #1e40af, #3b82f6);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      box-shadow: 0 4px 12px rgba(30, 64, 175, 0.35);
    }

    .brand-icon svg {
      width: 28px;
      height: 28px;
    }

    .brand h1 {
      font-size: 1.625rem;
      font-weight: 700;
      margin: 0;
      color: #111827;
      letter-spacing: -0.02em;
    }

    .brand p {
      font-size: 0.875rem;
      color: #6b7280;
      margin: 6px 0 0;
      font-weight: 400;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .input-group {
      position: relative;
    }

    .input-group label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      pointer-events: none;
      display: flex;
      align-items: center;
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1.5px solid #d1d5db;
      border-radius: 12px;
      font-size: 0.875rem;
      font-family: inherit;
      color: #111827;
      background: #f9fafb;
      transition: all 0.2s ease;
      outline: none;
    }

    .input-wrapper input::placeholder {
      color: #9ca3af;
    }

    .input-wrapper input:focus {
      border-color: #2563eb;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    .input-wrapper input.error {
      border-color: #ef4444;
      background: #fef2f2;
    }

    .btn-login {
      width: 100%;
      padding: 13px 16px;
      border-radius: 12px;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      background: linear-gradient(135deg, #1e40af, #2563eb);
      color: white;
      transition: all 0.2s ease;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(30, 64, 175, 0.35);
    }

    .btn-login:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn-login .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .btn-login.loading .spinner {
      display: inline-block;
    }

    .btn-login.loading .btn-text {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      font-size: 0.8125rem;
      color: #dc2626;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 10px 14px;
      margin-top: 4px;
    }

    .error-msg.visible {
      display: flex;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 8px 0 4px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    .divider span {
      font-size: 0.75rem;
      color: #9ca3af;
      font-weight: 500;
      white-space: nowrap;
    }

    .accounts-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .account-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      font-size: 0.8125rem;
      transition: all 0.15s ease;
      cursor: pointer;
    }

    .account-item:hover {
      background: #f3f4f6;
      border-color: #d1d5db;
    }

    .account-item .acc-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .account-item .acc-name {
      font-weight: 600;
      color: #374151;
      font-size: 0.8125rem;
    }

    .account-item .acc-creds {
      color: #9ca3af;
      font-size: 0.75rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .account-item .acc-role {
      font-size: 0.6875rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .acc-role.requester {
      background: #dbeafe;
      color: #1e40af;
    }

    .acc-role.marketing {
      background: #fce7f3;
      color: #9d174d;
    }

    .acc-role.management {
      background: #d1fae5;
      color: #065f46;
    }

    .footer-note {
      text-align: center;
      margin-top: 20px;
      font-size: 0.6875rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 2L11 13"></path>
            <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
          </svg>
        </div>
        <h1>Azul E.L.O.S.</h1>
        <p>Estrutura de Ligação Organizacional entre Setores</p>
      </div>

      <form class="login-form" id="loginForm">
        <div class="input-group">
          <label for="login">Usuário</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            </span>
            <input type="text" id="login" placeholder="Digite seu login" required autocomplete="username" autofocus>
          </div>
        </div>

        <div class="input-group">
          <label for="password">Senha</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
            </span>
            <input type="password" id="password" placeholder="Digite sua senha" required autocomplete="current-password">
          </div>
        </div>

        <div id="errorMsg" class="error-msg">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="15" y1="9" x2="9" y2="15"></line>
            <line x1="9" y1="9" x2="15" y2="15"></line>
          </svg>
          <span id="errorText"></span>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span class="spinner"></span>
          <span class="btn-text">Entrar</span>
        </button>
      </form>

      <div class="divider">
        <span>Contas de teste</span>
      </div>

      <div class="accounts-list">
        <div class="account-item" onclick="fillCreds('solicitante1', 'azul123')">
          <div class="acc-info">
            <span class="acc-name">Solicitante</span>
            <span class="acc-creds">solicitante1 · azul123</span>
          </div>
          <span class="acc-role requester">Solicitante</span>
        </div>
        <div class="account-item" onclick="fillCreds('marketing1', 'azul123')">
          <div class="acc-info">
            <span class="acc-name">Marketing</span>
            <span class="acc-creds">marketing1 · azul123</span>
          </div>
          <span class="acc-role marketing">Marketing</span>
        </div>
        <div class="account-item" onclick="fillCreds('gerencia1', 'azul123')">
          <div class="acc-info">
            <span class="acc-name">Gerência</span>
            <span class="acc-creds">gerencia1 · azul123</span>
          </div>
          <span class="acc-role management">Gerência</span>
        </div>
      </div>

      <div class="footer-note">
        Projeto acadêmico Inteli Camp · Dados fictícios
      </div>
    </div>
  </div>

  <script>
    function fillCreds(login, password) {
      document.getElementById('login').value = login;
      document.getElementById('password').value = password;
      document.getElementById('login').classList.add('error');
      document.getElementById('password').classList.add('error');
      setTimeout(function() {
        document.getElementById('login').classList.remove('error');
        document.getElementById('password').classList.remove('error');
      }, 600);
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const login = document.getElementById('login').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');
      const errorText = document.getElementById('errorText');

      if (!login || !password) {
        errorText.textContent = 'Preencha todos os campos.';
        errorMsg.classList.add('visible');
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;
      errorMsg.classList.remove('visible');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || 'Erro ao fazer login');
        }
        window.location.href = '/app';
      } catch (err) {
        errorText.textContent = err.message;
        errorMsg.classList.add('visible');
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
